server:
  port: 8080

spring:
  application:
    name: charity-trace
  datasource:
    url: jdbc:mysql://localhost:3306/charity?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: "ChangeThisSecretKeyToAtLeast256BitsForHS256!!"
    expiration-ms: 86400000

logging:
  level:
    org.hibernate.SQL: warn
