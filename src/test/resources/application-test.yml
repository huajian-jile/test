# 单元测试使用内存 H2，不依赖本机 MySQL
spring:
  datasource:
    url: jdbc:h2:mem:test_charity;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

# 单元测试不跑百条演示数据，加快启动
app:
  demo-seed-enabled: false
